name: Build Windows Installer

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.85.3 pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "电商工具箱v5" `
            --collect-data flet_desktop `
            --hidden-import flet --hidden-import flet_core --hidden-import flet_desktop `
            --hidden-import flet_core.file_picker --hidden-import flet_desktop.file_picker `
            --hidden-import flet_runtime `
            --collect-submodules flet --collect-submodules flet_core `
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 电商工具箱v5-Windows
          path: dist/电商工具箱v5.exe
