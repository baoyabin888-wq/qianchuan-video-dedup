name: Build Windows Installer

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.85.3 pyinstaller requests openai-whisper

      - name: Extract Flet engine
        shell: python
        run: |
          import os, tarfile
          pkg = os.path.dirname(__import__('flet_desktop').__file__)
          app_dir = os.path.join(pkg, 'app')
          for f in sorted(os.listdir(app_dir)):
            if f.endswith('.tar.gz'):
              with tarfile.open(os.path.join(app_dir, f), 'r:gz') as tf:
                tf.extractall('flet_engine')
              break

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "电商工具箱v5" `
            --add-data "flet_engine;flet_desktop/app/flet_engine" `
            --hidden-import flet --hidden-import flet_core --hidden-import flet_desktop `
            --hidden-import flet_core.file_picker --hidden-import flet_desktop.file_picker `
            --hidden-import flet_runtime `
            --collect-submodules flet --collect-submodules flet_core `
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 电商工具箱v5-Windows
          path: dist/电商工具箱v5.exe
